
<!DOCTYPE html>
<html>
<head>
<title>Inferno Clothing</title>

<style>
body {margin:0;font-family:Arial;}

.navbar {
  background:black;
  padding:15px;
  position:sticky;
  top:0;
}
.navbar a {
  color:white;
  margin:10px;
  text-decoration:none;
  font-weight:bold;
}

.section {
  padding:40px 20px;
}

.products {
  display:flex;
  flex-wrap:wrap;
}
.card {
  width:45%;
  margin:10px;
  border:1px solid #ccc;
  padding:10px;
}
.card img {width:100%;}

footer {
  background:black;
  color:white;
  text-align:center;
  padding:20px;
}
</style>

</head>

<body>

<div class="navbar">
  <a href="#home">Home</a>
  <a href="#men">Men</a>
  <a href="#women">Women</a>
  <a href="#contact">Contact</a>
</div>

<div id="home" class="section">
  <h1>Welcome to My Brand</h1>
  <p>Best clothing store</p>
</div>

<div id="men" class="section">
  <h2>Men Wear</h2>
  <div class="products">

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <h3>T-Shirt</h3>
      <p>Rs. 999</p>
    </div>

  </div>
</div>

<div id="contact" class="section">
  <h2>Contact Us</h2>
  <p>Email: your@email.com</p>
</div>

<footer>
  <p>© 2026 Inferno Clothing</p>
</footer>

</body>
</html>
