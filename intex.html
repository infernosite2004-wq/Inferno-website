<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inferno Clothing</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#ffffff;
}

header{
display:flex;
justify-content:space-between;
padding:20px 50px;
border-bottom:1px solid #eee;
}

.logo{
font-size:28px;
font-weight:bold;
letter-spacing:3px;
}

nav a{
margin:0 15px;
text-decoration:none;
color:#000;
font-weight:500;
}

.hero{
height:70vh;
background:url('https://images.unsplash.com/photo-1523381210434-271e8be1f52b');
background-size:cover;
display:flex;
align-items:center;
justify-content:center;
color:white;
text-align:center;
}

.hero h1{
font-size:50px;
}

.section{
padding:60px 40px;
}

.section h2{
text-align:center;
margin-bottom:40px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;
}

.product{
border:1px solid #eee;
padding:15px;
text-align:center;
}

.product img{
width:100%;
height:260px;
object-fit:cover;
}

.price{
font-weight:bold;
margin:10px 0;
}

.btn{
background:black;
color:white;
padding:10px 15px;
text-decoration:none;
display:inline-block;
}

.category{
display:flex;
justify-content:center;
gap:40px;
margin-bottom:40px;
}

.cat{
padding:20px 40px;
border:1px solid black;
cursor:pointer;
}

footer{
background:#111;
color:white;
text-align:center;
padding:30px;
margin-top:40px;
}

</style>

</head>

<body>

<header>
<div class="logo">INFERNO</div>

<nav>
<a href="#">Home</a>
<a href="#">Men</a>
<a href="#">Women</a>
</nav>
</header>

<section class="hero">
<div>
<h1>Inferno Clothing</h1>
<p>Premium Streetwear Collection</p>
</div>
</section>

<section class="section">

<h2>Shop By Category</h2>

<div class="category">
<div class="cat">Men T-Shirts</div>
<div class="cat">Women T-Shirts</div>
</div>

</section>

<section class="section">

<h2>Trending Products</h2>

<div class="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1520975922323-91d9c9c8c1c4">
<h3>Inferno Black Tee</h3>
<div class="price">₹799</div>
<a class="btn" href="https://wa.me/91XXXXXXXXXX">Order on WhatsApp</a>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
<h3>Classic White Tee</h3>
<div class="price">₹699</div>
<a class="btn" href="https://wa.me/91XXXXXXXXXX">Order on WhatsApp</a>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d">
<h3>Oversized Street Tee</h3>
<div class="price">₹899</div>
<a class="btn" href="https://wa.me/91XXXXXXXXXX">Order on WhatsApp</a>
</div>

</div>

</section>

<footer>

<p>© 2026 Inferno Clothing</p>

</footer>

</body>
</html>
